{% extends "base.html" %}
{% block title %} — INVESTIGATE{% endblock %}

{% block extra_css %}
<style>
/* ── INVESTIGATE page ─────────────────────────────────── */
.inv-hero {
  padding: 2rem 1.2rem 0.8rem;
  max-width: 1600px;
  margin: 0 auto;
}
.inv-title {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 0.6rem;
}

/* ── Search bar ── */
.inv-search-wrap {
  position: relative;
}
.inv-search-input {
  width: 100%; height: 50px;
  background: var(--bg-card);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  color: var(--text); font-family: var(--font-mono); font-size: 1rem;
  padding: 0 1rem 0 3rem;
  transition: border-color 0.15s, box-shadow 0.15s;
  caret-color: #e6a817;
}
.inv-search-input:focus {
  outline: none;
  border-color: #e6a817;
  box-shadow: 0 0 0 2px rgba(230,168,23,0.12);
}
.inv-search-input::placeholder { color: var(--text-muted); font-size: 0.85rem; }
.inv-search-icon {
  position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 1rem; pointer-events: none;
}
.inv-spinner {
  position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: #e6a817;
  border-radius: 50%; animation: inv-spin 0.7s linear infinite;
  display: none;
}
@keyframes inv-spin { to { transform: translateY(-50%) rotate(360deg); } }
.inv-spinner.visible { display: block; }

/* ── History dropdown ── */
.inv-history {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
  background: var(--bg-card); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--radius) var(--radius);
  display: none;
}
.inv-history.open { display: block; }
.inv-history-item {
  padding: 0.45rem 1rem 0.45rem 3rem;
  font-size: 0.8rem; color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; gap: 0.5rem;
}
.inv-history-item:hover { background: var(--bg-hover); color: var(--text); }
.inv-history-item .hi-icon { color: var(--text-muted); font-size: 0.75rem; }

/* ── Scope pills ── */
.inv-scopes {
  display: flex; gap: 0.4rem; margin-top: 0.7rem; flex-wrap: wrap;
}
.inv-scope {
  padding: 0.22rem 0.8rem; border-radius: 20px;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  font-family: var(--font-mono); transition: all 0.1s;
}
.inv-scope:hover { border-color: var(--border-hi); color: var(--text); }
.inv-scope.active { background: rgba(230,168,23,0.12); border-color: #e6a817; color: #e6a817; }

/* ── Results container ── */
.inv-results {
  max-width: 1600px; margin: 0 auto;
  padding: 0.8rem 1.2rem 2rem;
  display: none;
}
.inv-results.visible { display: block; }

/* No-results / status */
.inv-status {
  text-align: center; padding: 2.5rem 1rem;
  color: var(--text-muted); font-size: 0.82rem;
}
.inv-status .sq { color: var(--amber); font-size: 1.4rem; display: block; margin-bottom: 0.5rem; }
.inv-suggestions { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
.inv-suggestion-item {
  display: inline-block; padding: 0.25rem 0.7rem;
  font-size: 0.73rem; color: var(--blue); cursor: pointer;
  border-bottom: 1px dashed var(--border);
}
.inv-suggestion-item:hover { color: var(--text); }

/* ── Result group ── */
.inv-group { margin-bottom: 1.2rem; }
.inv-group-hdr {
  display: flex; align-items: center; gap: 0.6rem;
  margin-bottom: 0.5rem; padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
}
.inv-group-hdr .gh-label {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.inv-group-hdr .gh-count {
  font-size: 0.65rem; color: var(--text-muted); margin-left: auto;
}
.gh-devices  { color: #e6a817; }
.gh-vehicles { color: #00c8dc; }
.gh-signals  { color: var(--purple); }
.gh-alerts   { color: var(--red); }

/* ── Device card ── */
.inv-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 0.45rem;
  overflow: hidden;
  transition: border-color 0.12s;
}
.inv-card:hover { border-color: var(--border-hi); }
.inv-card.expanded { border-color: var(--border-hi); }

.inv-card-row {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0.8rem; cursor: pointer;
  flex-wrap: wrap;
}
.inv-card-mac {
  font-size: 0.82rem; font-weight: 600; font-family: var(--font-mono);
  white-space: nowrap;
}
.mac-resident  { color: var(--green); }
.mac-neighbor  { color: var(--blue); }
.mac-visitor   { color: var(--purple); }
.mac-flagged   { color: var(--red); }
.mac-unknown   { color: #e6a817; }
.mac-ignore    { color: var(--text-muted); }

.inv-card-vendor {
  font-size: 0.78rem; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px;
}
.inv-card-meta {
  margin-left: auto; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.inv-card-stats {
  display: flex; gap: 1.2rem; padding: 0 0.8rem 0.55rem;
  font-size: 0.72rem; color: var(--text-dim); flex-wrap: wrap;
}
.inv-stat-item { display: flex; flex-direction: column; }
.inv-stat-item .sv { color: var(--text); font-weight: 600; font-size: 0.8rem; }
.inv-stat-item .sk { font-size: 0.62rem; color: var(--text-muted); margin-top: 1px; }

.inv-ssids {
  padding: 0 0.8rem 0.6rem;
  display: flex; gap: 0.3rem; flex-wrap: wrap;
}
.inv-ssid-badge {
  font-size: 0.65rem; padding: 0.1rem 0.45rem; border-radius: 3px;
  background: rgba(88,166,255,0.1); color: var(--blue);
  border: 1px solid rgba(88,166,255,0.2);
  cursor: pointer; white-space: nowrap;
}
.inv-ssid-badge:hover { background: rgba(88,166,255,0.18); }

.inv-card-links {
  padding: 0 0.8rem 0.6rem;
  display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
}

/* ── Vehicle / signal card variants ── */
.inv-card-veh .inv-card-mac { color: #00c8dc; }
.inv-card-sig .inv-card-mac { color: var(--purple); }

.inv-ghost-badge {
  font-size: 0.62rem; padding: 0.1rem 0.45rem; border-radius: 3px;
  background: rgba(248,81,73,0.15); color: var(--red);
  border: 1px solid rgba(248,81,73,0.3); font-weight: 700;
  letter-spacing: 0.5px; white-space: nowrap;
}
.inv-vehicle-line {
  font-size: 0.72rem; color: #00c8dc;
  padding: 0 0.8rem 0.5rem;
}
.inv-camera-line {
  font-size: 0.72rem; color: var(--purple);
  padding: 0 0.8rem 0.5rem;
}

/* ── SSID cluster badges (for vehicles) ── */
.inv-cluster-row {
  padding: 0 0.8rem 0.6rem;
  display: flex; gap: 0.3rem; flex-wrap: wrap; align-items: center;
}
.inv-cluster-label {
  font-size: 0.62rem; color: var(--text-muted); margin-right: 0.2rem;
}
.inv-cluster-ssid {
  font-size: 0.65rem; padding: 0.1rem 0.45rem; border-radius: 3px;
  background: rgba(0,200,220,0.08); color: #00c8dc;
  border: 1px solid rgba(0,200,220,0.2); white-space: nowrap;
  cursor: pointer;
}
.inv-cluster-ssid:hover { background: rgba(0,200,220,0.15); }
.inv-bt-vendor {
  font-size: 0.65rem; padding: 0.1rem 0.45rem; border-radius: 3px;
  background: rgba(188,140,255,0.08); color: var(--purple);
  border: 1px solid rgba(188,140,255,0.2); white-space: nowrap;
}

/* ── Alert card ── */
.inv-alert-row {
  padding: 0.5rem 0.8rem; font-size: 0.75rem; color: var(--text-dim);
  border-left: 3px solid transparent;
}
.inv-alert-row.lv-red    { border-left-color: var(--red); }
.inv-alert-row.lv-yellow { border-left-color: var(--yellow); }
.inv-alert-row.lv-green  { border-left-color: var(--green); }
.inv-alert-msg {
  margin-top: 0.2rem; font-size: 0.7rem; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Connections panel ── */
.inv-connections {
  border-top: 1px solid var(--border);
  background: var(--bg); padding: 0.8rem;
  display: none;
}
.inv-connections.open { display: block; }
.conn-loading {
  text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.78rem;
}
.conn-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: #e6a817;
  border-radius: 50%; animation: inv-spin 0.7s linear infinite;
  margin-right: 0.5rem; vertical-align: middle;
}
.conn-section { margin-bottom: 0.9rem; }
.conn-section-hdr {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.conn-mini-cards { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.conn-mini-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.45rem 0.65rem;
  font-size: 0.75rem; cursor: pointer; transition: border-color 0.1s;
  min-width: 160px; flex: 1; max-width: 260px;
}
.conn-mini-card:hover { border-color: var(--border-hi); }
.conn-mini-card .cm-mac { font-weight: 600; font-size: 0.78rem; }
.conn-mini-card .cm-vendor { color: var(--text-muted); font-size: 0.68rem; margin-top: 1px; }
.conn-mini-card .cm-appear { color: var(--text-muted); font-size: 0.65rem; }

.conn-vehicle-card {
  background: var(--bg-card); border: 1px solid rgba(0,200,220,0.2);
  border-radius: var(--radius); padding: 0.5rem 0.7rem;
  font-size: 0.75rem; display: inline-flex; gap: 0.8rem;
  flex-wrap: wrap; align-items: center; cursor: pointer;
}
.conn-vehicle-card:hover { border-color: rgba(0,200,220,0.4); }
.conn-vehicle-card .cv-id { color: #00c8dc; font-weight: 600; }
.conn-vehicle-card .cv-count { color: var(--text-muted); font-size: 0.68rem; }

.conn-alert-item {
  display: flex; gap: 0.6rem; align-items: flex-start;
  padding: 0.3rem 0; border-bottom: 1px solid var(--border); font-size: 0.72rem;
}
.conn-alert-item:last-child { border-bottom: none; }
.conn-alert-item .ca-time { color: var(--text-muted); white-space: nowrap; min-width: 65px; }
.conn-alert-item .ca-msg { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.conn-no-data { color: var(--text-muted); font-size: 0.75rem; font-style: italic; }

.conn-sparkline-wrap { display: flex; align-items: flex-end; gap: 3px; height: 36px; }
.conn-spark-bar {
  flex: 1; min-width: 6px; border-radius: 2px 2px 0 0;
  background: rgba(230,168,23,0.35);
  position: relative; min-height: 2px;
  transition: background 0.1s;
}
.conn-spark-bar.today { background: rgba(230,168,23,0.75); }
.conn-spark-bar:hover { background: rgba(230,168,23,0.6); }

/* ── Expand arrow ── */
.inv-expand-arrow {
  font-size: 0.65rem; color: var(--text-muted); margin-left: auto;
  transition: transform 0.15s;
  pointer-events: none;
}
.expanded .inv-expand-arrow { transform: rotate(180deg); }
</style>
{% endblock %}

{% block content %}
<!-- HERO: search bar -->
<div class="inv-hero">
  <div class="inv-title">&#x25A0; INVESTIGATE — intelligence analyst workstation</div>

  <div class="inv-search-wrap" id="search-wrap">
    <span class="inv-search-icon">&#x2315;</span>
    <input
      type="text"
      id="inv-input"
      class="inv-search-input"
      placeholder="Search MAC, vendor, SSID, vehicle model, signal…"
      autocomplete="off"
      spellcheck="false"
    >
    <div class="inv-spinner" id="inv-spinner"></div>
    <div class="inv-history" id="inv-history"></div>
  </div>

  <div class="inv-scopes">
    <button class="inv-scope active" data-scope="all">ALL</button>
    <button class="inv-scope" data-scope="devices">DEVICES</button>
    <button class="inv-scope" data-scope="vehicles">VEHICLES</button>
    <button class="inv-scope" data-scope="signals">SIGNALS</button>
  </div>
</div>

<!-- RESULTS -->
<div class="inv-results" id="inv-results"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  /* ── State ── */
  var currentScope = 'all';
  var debounceTimer = null;
  var historyKey = 'inv_history_v1';
  var expandedCards = {};   // device_id → connections data cache
  var sparklineCharts = {}; // canvas_id → Chart instance

  /* ── DOM refs ── */
  var inp       = document.getElementById('inv-input');
  var spinner   = document.getElementById('inv-spinner');
  var resultsEl = document.getElementById('inv-results');
  var historyEl = document.getElementById('inv-history');
  var scopeBtns = document.querySelectorAll('.inv-scope');

  /* ── Scope pills ── */
  scopeBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      scopeBtns.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentScope = btn.dataset.scope;
      if (inp.value.trim().length >= 2) doSearch(inp.value.trim());
    });
  });

  /* ── Search history ── */
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(historyKey) || '[]'); }
    catch(e) { return []; }
  }
  function pushHistory(q) {
    var h = getHistory().filter(function(s){ return s !== q; });
    h.unshift(q);
    if (h.length > 5) h = h.slice(0, 5);
    try { localStorage.setItem(historyKey, JSON.stringify(h)); } catch(e) {}
  }
  function showHistory() {
    var h = getHistory();
    if (!h.length) { historyEl.classList.remove('open'); return; }
    historyEl.innerHTML = h.map(function(s) {
      return '<div class="inv-history-item" data-q="' + esc(s) + '">'
        + '<span class="hi-icon">&#x231B;</span>' + esc(s) + '</div>';
    }).join('');
    historyEl.classList.add('open');
  }
  function hideHistory() {
    setTimeout(function(){ historyEl.classList.remove('open'); }, 150);
  }
  historyEl.addEventListener('click', function(e) {
    var item = e.target.closest('.inv-history-item');
    if (!item) return;
    inp.value = item.dataset.q;
    hideHistory();
    doSearch(item.dataset.q);
  });
  inp.addEventListener('focus', function(){ if (!inp.value.trim()) showHistory(); });
  inp.addEventListener('blur', hideHistory);

  /* ── Input / debounce ── */
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      clearTimeout(debounceTimer);
      hideHistory();
      if (inp.value.trim().length >= 2) doSearch(inp.value.trim());
    }
    if (e.key === 'Escape') {
      inp.value = ''; resultsEl.classList.remove('visible');
      resultsEl.innerHTML = ''; hideHistory();
    }
  });
  inp.addEventListener('input', function() {
    var q = inp.value.trim();
    if (!q) { historyEl.classList.remove('open'); return; }
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function(){
      if (q.length >= 2) doSearch(q);
    }, 400);
  });

  /* ── Search ── */
  function doSearch(q) {
    spinner.classList.add('visible');
    resultsEl.classList.add('visible');
    resultsEl.innerHTML = '<div class="inv-status"><span class="conn-spinner"></span> Searching…</div>';

    fetch('/api/investigate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query: q, scope: currentScope }),
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      spinner.classList.remove('visible');
      pushHistory(q);
      renderResults(data, q);
    })
    .catch(function(err) {
      spinner.classList.remove('visible');
      resultsEl.innerHTML = '<div class="inv-status"><span class="sq">&#x26A0;</span>Request failed: ' + esc(String(err)) + '</div>';
    });
  }

  /* ── Render results ── */
  function renderResults(data, q) {
    var html = '';
    var anyResult = false;

    if (data.error) {
      resultsEl.innerHTML = '<div class="inv-status"><span class="sq">&#x25A1;</span>' + esc(data.error) + '</div>';
      return;
    }

    if (data.devices && data.devices.length) {
      anyResult = true;
      html += '<div class="inv-group">';
      html += '<div class="inv-group-hdr"><span class="gh-label gh-devices">&#x25CF; Devices</span>'
            + '<span class="gh-count">' + data.devices.length + ' result' + (data.devices.length !== 1 ? 's' : '') + '</span></div>';
      data.devices.forEach(function(d){ html += renderDeviceCard(d); });
      html += '</div>';
    }

    if (data.vehicles && data.vehicles.length) {
      anyResult = true;
      html += '<div class="inv-group">';
      html += '<div class="inv-group-hdr"><span class="gh-label gh-vehicles">&#x25A0; Vehicles</span>'
            + '<span class="gh-count">' + data.vehicles.length + ' result' + (data.vehicles.length !== 1 ? 's' : '') + '</span></div>';
      data.vehicles.forEach(function(v){ html += renderVehicleCard(v); });
      html += '</div>';
    }

    if (data.signals && data.signals.length) {
      anyResult = true;
      html += '<div class="inv-group">';
      html += '<div class="inv-group-hdr"><span class="gh-label gh-signals">&#x25B6; Signals</span>'
            + '<span class="gh-count">' + data.signals.length + ' result' + (data.signals.length !== 1 ? 's' : '') + '</span></div>';
      data.signals.forEach(function(s){ html += renderSignalCard(s); });
      html += '</div>';
    }

    if (data.alerts && data.alerts.length) {
      anyResult = true;
      html += '<div class="inv-group">';
      html += '<div class="inv-group-hdr"><span class="gh-label gh-alerts">&#x26A0; Alerts</span>'
            + '<span class="gh-count">' + data.alerts.length + ' result' + (data.alerts.length !== 1 ? 's' : '') + '</span></div>';
      data.alerts.forEach(function(a){ html += renderAlertRow(a); });
      html += '</div>';
    }

    if (!anyResult) {
      html += '<div class="inv-status">'
        + '<span class="sq">&#x25A1;</span>No matches for <strong>' + esc(q) + '</strong>'
        + '<div class="inv-suggestions">'
        + '<span class="inv-suggestion-item" data-q="' + esc(q.split(/\s+/)[0]) + '">Try first word only: ' + esc(q.split(/\s+/)[0]) + '</span>'
        + '<span class="inv-suggestion-item" data-vendor="">Browse by vendor name</span>'
        + '<span class="inv-suggestion-item" data-scope-hint="vehicles">Search vehicles: Toyota, Hyundai, Schrader</span>'
        + '</div></div>';
    }

    resultsEl.innerHTML = html;

    /* Wire up device card expand */
    resultsEl.querySelectorAll('.inv-card[data-dev-id]').forEach(function(card) {
      var trigger = card.querySelector('.inv-card-row');
      if (!trigger) return;
      trigger.addEventListener('click', function(e) {
        /* Don't expand when clicking links/buttons */
        if (e.target.closest('a, button, .inv-ssid-badge, .inv-cluster-ssid')) return;
        toggleConnections(card);
      });
    });

    /* Wire up "find vendor" buttons */
    resultsEl.querySelectorAll('[data-search-vendor]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        inp.value = btn.dataset.searchVendor;
        doSearch(btn.dataset.searchVendor);
      });
    });

    /* Wire up SSID badges as search triggers */
    resultsEl.querySelectorAll('[data-search-ssid]').forEach(function(el) {
      el.addEventListener('click', function() {
        inp.value = el.dataset.searchSsid;
        doSearch(el.dataset.searchSsid);
      });
    });

    /* Wire up suggestion hints */
    resultsEl.querySelectorAll('.inv-suggestion-item[data-q]').forEach(function(el) {
      if (!el.dataset.q) return;
      el.addEventListener('click', function() {
        inp.value = el.dataset.q;
        doSearch(el.dataset.q);
      });
    });
    resultsEl.querySelectorAll('.inv-suggestion-item[data-scope-hint]').forEach(function(el) {
      el.addEventListener('click', function() {
        scopeBtns.forEach(function(b){ b.classList.remove('active'); });
        var target = document.querySelector('.inv-scope[data-scope="' + el.dataset.scopeHint + '"]');
        if (target) { target.classList.add('active'); currentScope = el.dataset.scopeHint; }
        inp.value = q;
        doSearch(q);
      });
    });

    /* Wire up co-arrival vehicle search */
    resultsEl.querySelectorAll('[data-search-vehicle]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        inp.value = btn.dataset.searchVehicle;
        scopeBtns.forEach(function(b){ b.classList.remove('active'); });
        var v = document.querySelector('.inv-scope[data-scope="vehicles"]');
        if (v) { v.classList.add('active'); currentScope = 'vehicles'; }
        doSearch(btn.dataset.searchVehicle);
      });
    });
  }

  /* ── Device card HTML ── */
  function renderDeviceCard(d) {
    var macClass = 'mac-' + (d.category || 'unknown');
    var label = d.alias || d.mac;
    var sightStr = (d.total_sightings || 0).toLocaleString();
    var daysStr  = d.days_seen || '—';
    var dwellStr = d.avg_dwell_minutes ? d.avg_dwell_minutes + 'm' : '—';
    var firstStr = d.first_seen ? fmtDateOnly(d.first_seen) : '—';
    var lastStr  = d.last_seen  ? fmtTimeAgo(d.last_seen) : '—';

    var html = '<div class="inv-card" data-dev-id="' + d.id + '">';
    html += '<div class="inv-card-row">';
    html += '<span class="inv-card-mac ' + macClass + '">' + esc(label) + '</span>';
    if (d.alias && d.alias !== d.mac) html += '<span class="inv-card-vendor" style="color:var(--text-dim);font-size:0.73rem">' + esc(d.mac) + '</span>';
    if (d.vendor) html += '<span class="inv-card-vendor">' + esc(d.vendor) + '</span>';

    html += '<div class="inv-card-meta">';
    if (d.is_randomized) html += '<span class="badge badge-dim" title="Randomized MAC">RAND</span>';
    if (d.device_type && d.device_type !== 'wifi') html += '<span class="badge badge-dim">' + esc(d.device_type.replace('_',' ').toUpperCase()) + '</span>';
    html += '<span class="badge badge-tag tag-' + (d.category||'unknown') + '">' + esc(d.category || 'unknown') + (d.tag_label ? ' · ' + esc(d.tag_label) : '') + '</span>';
    if (d.flagged)       html += '<span class="badge badge-red">FLAGGED</span>';
    if (d.threat_level === 'red')    html += '<span class="badge badge-red">&#x25CF; RED</span>';
    if (d.threat_level === 'yellow') html += '<span class="badge badge-yellow">&#x25CF; YELLOW</span>';
    html += '<span class="inv-expand-arrow">&#x25BC;</span>';
    html += '</div></div>'; /* end inv-card-row */

    /* Stats row */
    html += '<div class="inv-card-stats">';
    html += '<div class="inv-stat-item"><span class="sv">' + sightStr + '</span><span class="sk">sightings</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + daysStr + '</span><span class="sk">days seen</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + dwellStr + '</span><span class="sk">avg dwell</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + firstStr + '</span><span class="sk">first seen</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + lastStr + '</span><span class="sk">last seen</span></div>';
    if (d.baseline) {
      var blStr = 'h' + (d.baseline.typical_start || '?') + '–h' + (d.baseline.typical_end || '?');
      html += '<div class="inv-stat-item"><span class="sv">' + blStr + '</span><span class="sk">typical window</span></div>';
    }
    if (d.frigate_appearances) {
      html += '<div class="inv-stat-item"><span class="sv" style="color:var(--purple)">' + d.frigate_appearances + '</span><span class="sk">on camera</span></div>';
    }
    html += '</div>';

    /* Probe SSIDs */
    if (d.probe_ssids && d.probe_ssids.length) {
      html += '<div class="inv-ssids">';
      d.probe_ssids.forEach(function(s) {
        html += '<span class="inv-ssid-badge" data-search-ssid="' + esc(s) + '">' + esc(s) + '</span>';
      });
      html += '</div>';
    }

    /* Correlated vehicle + camera */
    if (d.correlated_vehicle) {
      html += '<div class="inv-vehicle-line">&#x27A1; arrives with vehicle&nbsp;'
        + '<span class="inv-cluster-ssid" data-search-ssid="' + esc(d.correlated_vehicle) + '">' + esc(d.correlated_vehicle) + '</span>'
        + '</div>';
    }
    if (d.frigate_appearances) {
      html += '<div class="inv-camera-line">&#x1F441; seen on camera ' + d.frigate_appearances + ' time' + (d.frigate_appearances !== 1 ? 's' : '') + '</div>';
    }

    /* Action links */
    html += '<div class="inv-card-links">';
    html += '<a href="/devices/' + d.id + '" class="btn btn-sm">Full profile &#x2197;</a>';
    if (d.vendor) html += '<button class="btn btn-sm" data-search-vendor="' + esc(d.vendor) + '">Find same vendor</button>';
    html += '</div>';

    /* Connections panel placeholder */
    html += '<div class="inv-connections" id="conn-' + d.id + '">'
          + '<div class="conn-loading"><span class="conn-spinner"></span>Loading connections…</div>'
          + '</div>';

    html += '</div>'; /* end inv-card */
    return html;
  }

  /* ── Vehicle card HTML ── */
  function renderVehicleCard(v) {
    var sightStr = (v.sighting_count || 0).toLocaleString();
    var lastStr  = v.last_seen ? fmtTimeAgo(v.last_seen) : '—';
    var firstStr = v.first_seen ? fmtDateOnly(v.first_seen) : '—';

    var html = '<div class="inv-card inv-card-veh">';
    html += '<div class="inv-card-row" style="cursor:default">';
    html += '<span class="inv-card-mac">' + esc(v.sensor_id) + '</span>';
    if (v.model) html += '<span class="badge badge-dim" style="color:#00c8dc;border-color:rgba(0,200,220,0.3);background:rgba(0,200,220,0.08)">' + esc(v.model) + '</span>';
    html += '<div class="inv-card-meta">';
    html += '<span class="badge badge-dim">' + sightStr + ' sightings</span>';
    if (v.ghost) html += '<span class="inv-ghost-badge">NO RF CORRELATION</span>';
    if (v.flagged) html += '<span class="badge badge-red">FLAGGED</span>';
    html += '</div></div>'; /* end row */

    html += '<div class="inv-card-stats">';
    html += '<div class="inv-stat-item"><span class="sv" style="color:#00c8dc">' + sightStr + '</span><span class="sk">sightings</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + firstStr + '</span><span class="sk">first seen</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + lastStr + '</span><span class="sk">last seen</span></div>';
    if (v.avg_rssi != null) html += '<div class="inv-stat-item"><span class="sv">' + v.avg_rssi.toFixed(1) + ' dBm</span><span class="sk">avg RSSI</span></div>';
    if (v.identity_cluster) {
      html += '<div class="inv-stat-item"><span class="sv">' + (v.identity_cluster.bundle_count || 0) + '</span><span class="sk">bundles</span></div>';
      if (v.identity_cluster.camera_appearances) {
        html += '<div class="inv-stat-item"><span class="sv" style="color:var(--purple)">' + v.identity_cluster.camera_appearances + '</span><span class="sk">on camera</span></div>';
      }
    }
    html += '</div>';

    if (v.identity_cluster) {
      var ic = v.identity_cluster;
      if (ic.representative_ssids && ic.representative_ssids.length) {
        html += '<div class="inv-cluster-row"><span class="inv-cluster-label">SSID fingerprint:</span>';
        ic.representative_ssids.slice(0, 6).forEach(function(s) {
          html += '<span class="inv-cluster-ssid" data-search-ssid="' + esc(s) + '">' + esc(s) + '</span>';
        });
        html += '</div>';
      }
      if (ic.associated_bt_vendors && ic.associated_bt_vendors.length) {
        html += '<div class="inv-cluster-row"><span class="inv-cluster-label">BT devices:</span>';
        ic.associated_bt_vendors.forEach(function(bt) {
          html += '<span class="inv-bt-vendor">' + esc(bt) + '</span>';
        });
        html += '</div>';
      }
      if (ic.dominant_camera) {
        html += '<div class="inv-camera-line">&#x1F4F9; dominant camera: ' + esc(ic.dominant_camera) + '</div>';
      }
    }

    html += '<div class="inv-card-links">';
    html += '<a href="/vehicles" class="btn btn-sm">Vehicles page &#x2197;</a>';
    html += '<button class="btn btn-sm" data-search-vehicle="' + esc(v.sensor_id) + '">Re-search this vehicle</button>';
    html += '</div></div>';
    return html;
  }

  /* ── Signal card HTML ── */
  function renderSignalCard(s) {
    var scColor = {'tpms':'#00c8dc','weather':'var(--green)','keyfob':'var(--yellow)','security':'var(--red)','power':'var(--orange)'}[s.signal_class] || 'var(--purple)';
    var html = '<div class="inv-card inv-card-sig">';
    html += '<div class="inv-card-row" style="cursor:default">';
    html += '<span class="badge" style="background:transparent;border:1px solid ' + scColor + ';color:' + scColor + '">' + esc((s.signal_class||'OTHER').toUpperCase()) + '</span>';
    html += '<span class="inv-card-mac">' + esc(s.model || s.device_uid) + '</span>';
    html += '<span class="inv-card-vendor">' + esc(s.device_uid) + '</span>';
    html += '<div class="inv-card-meta"><span class="badge badge-dim">' + (s.count||0).toLocaleString() + ' signals</span></div>';
    html += '</div>';
    html += '<div class="inv-card-stats">';
    html += '<div class="inv-stat-item"><span class="sv" style="color:' + scColor + '">' + (s.count||0).toLocaleString() + '</span><span class="sk">total signals</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + (s.first_seen ? fmtDateOnly(s.first_seen) : '—') + '</span><span class="sk">first seen</span></div>';
    html += '<div class="inv-stat-item"><span class="sv">' + (s.last_seen ? fmtTimeAgo(s.last_seen) : '—') + '</span><span class="sk">last seen</span></div>';
    if (s.avg_rssi != null) html += '<div class="inv-stat-item"><span class="sv">' + s.avg_rssi + ' dBm</span><span class="sk">avg RSSI</span></div>';
    html += '</div>';
    html += '<div class="inv-card-links"><a href="/sdr" class="btn btn-sm">Signals page &#x2197;</a></div>';
    html += '</div>';
    return html;
  }

  /* ── Alert row HTML ── */
  function renderAlertRow(a) {
    var strip = (a.message || '').replace(/<[^>]+>/g, '').replace(/\n/g,' ').trim();
    return '<div class="inv-card">'
      + '<div class="inv-alert-row lv-' + (a.level||'green') + '">'
      + '<div style="display:flex;gap:0.6rem;align-items:center">'
      + '<span class="badge badge-' + (a.level==='red'?'red':a.level==='yellow'?'yellow':'green') + '">' + esc((a.level||'').toUpperCase()) + '</span>'
      + '<span style="color:var(--text-dim);font-size:0.72rem">' + (a.alert_type||'') + '</span>'
      + '<span style="margin-left:auto;color:var(--text-muted);font-size:0.68rem">' + (a.timestamp ? fmtTimeAgo(a.timestamp) : '') + '</span>'
      + (a.device_id ? '<a href="/devices/' + a.device_id + '" class="btn btn-sm" style="padding:0.1rem 0.4rem">Device</a>' : '')
      + '</div>'
      + '<div class="inv-alert-msg">' + esc(strip) + '</div>'
      + '</div></div>';
  }

  /* ── Connections expand/collapse ── */
  function toggleConnections(card) {
    var devId = parseInt(card.dataset.devId);
    var panel = card.querySelector('.inv-connections');
    if (!panel) return;

    var isOpen = panel.classList.contains('open');
    /* Close all others */
    resultsEl.querySelectorAll('.inv-connections.open').forEach(function(p){ p.classList.remove('open'); });
    resultsEl.querySelectorAll('.inv-card.expanded').forEach(function(c){ c.classList.remove('expanded'); });

    if (isOpen) return; /* was open → just close */

    card.classList.add('expanded');
    panel.classList.add('open');

    /* Load if not cached */
    if (expandedCards[devId]) {
      renderConnections(panel, expandedCards[devId], devId);
    } else {
      panel.innerHTML = '<div class="conn-loading"><span class="conn-spinner"></span>Loading connections…</div>';
      fetch('/api/investigate/connections/' + devId)
        .then(function(r){ return r.json(); })
        .then(function(data) {
          expandedCards[devId] = data;
          renderConnections(panel, data, devId);
        })
        .catch(function(err) {
          panel.innerHTML = '<div class="conn-loading" style="color:var(--red)">Failed to load connections</div>';
        });
    }
  }

  /* ── Render connections panel ── */
  function renderConnections(panel, data, devId) {
    var html = '';

    /* Co-present devices */
    html += '<div class="conn-section">';
    html += '<div class="conn-section-hdr">&#x25C6; Co-present devices (14d)</div>';
    if (data.co_present_devices && data.co_present_devices.length) {
      html += '<div class="conn-mini-cards">';
      data.co_present_devices.forEach(function(d) {
        var catColor = {'resident':'var(--green)','neighbor':'var(--blue)','flagged':'var(--red)','unknown':'#e6a817'}[d.category] || 'var(--text-dim)';
        html += '<div class="conn-mini-card" onclick="searchFor(\'' + esc(d.mac) + '\')">';
        html += '<div class="cm-mac" style="color:' + catColor + '">' + esc(d.alias || d.mac) + '</div>';
        html += '<div class="cm-vendor">' + esc(d.vendor || d.mac) + '</div>';
        html += '<div class="cm-appear">' + (d.co_appearances || 0) + ' co-appearances &middot; ' + esc(d.category || 'unknown') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="conn-no-data">No co-present devices found in presence bundles</div>';
    }
    html += '</div>';

    /* Co-present vehicle */
    html += '<div class="conn-section">';
    html += '<div class="conn-section-hdr">&#x25A0; Associated vehicle</div>';
    if (data.co_present_vehicle) {
      var v = data.co_present_vehicle;
      html += '<div class="conn-vehicle-card" onclick="searchVehicle(\'' + esc(v.sensor_id) + '\')">';
      html += '<span class="cv-id">' + esc(v.sensor_id) + '</span>';
      if (v.model) html += '<span class="badge badge-dim" style="color:#00c8dc">' + esc(v.model) + '</span>';
      html += '<span class="cv-count">' + (v.sighting_count||0) + ' sightings &middot; ' + (v.co_appearances||0) + ' co-present</span>';
      if (v.ghost) html += '<span class="inv-ghost-badge">NO RF CORR</span>';
      html += '</div>';
    } else {
      html += '<div class="conn-no-data">No vehicle correlation found</div>';
    }
    html += '</div>';

    /* Alert history */
    html += '<div class="conn-section">';
    html += '<div class="conn-section-hdr">&#x26A0; Alert history</div>';
    if (data.alerts && data.alerts.length) {
      data.alerts.forEach(function(a) {
        var lc = a.level === 'red' ? 'var(--red)' : a.level === 'yellow' ? 'var(--yellow)' : 'var(--green)';
        var strip = (a.message || '').replace(/<[^>]+>/g, '').replace(/\n/g,' ').trim().slice(0, 120);
        html += '<div class="conn-alert-item">'
          + '<span class="badge badge-' + (a.level||'green') + '" style="min-width:50px;text-align:center">' + (a.level||'').toUpperCase() + '</span>'
          + '<span class="ca-time">' + (a.timestamp ? fmtTimeAgo(a.timestamp) : '') + '</span>'
          + '<span class="ca-msg">' + esc(strip) + '</span>'
          + '</div>';
      });
    } else {
      html += '<div class="conn-no-data">No alerts recorded for this device</div>';
    }
    html += '</div>';

    /* Visit sparkline */
    html += '<div class="conn-section">';
    html += '<div class="conn-section-hdr">&#x25AC; Visits — last 7 days</div>';
    var sparkId = 'spark-' + devId;
    html += '<div style="display:flex;align-items:center;gap:1rem">';
    html += '<div class="conn-sparkline-wrap" id="' + sparkId + '-wrap">';
    if (data.visit_sparkline && data.visit_sparkline.length) {
      var maxV = Math.max.apply(null, data.visit_sparkline) || 1;
      var days = ['–6d','–5d','–4d','–3d','–2d','–1d','today'];
      data.visit_sparkline.forEach(function(v, i) {
        var pct = Math.max(5, Math.round((v / maxV) * 100));
        var isToday = (i === 6);
        html += '<div class="conn-spark-bar' + (isToday ? ' today' : '') + '" '
          + 'style="height:' + pct + '%" '
          + 'title="' + days[i] + ': ' + v + ' visit' + (v !== 1 ? 's' : '') + '"></div>';
      });
    }
    html += '</div>';
    if (data.visit_sparkline) {
      var total = data.visit_sparkline.reduce(function(a,b){ return a+b; }, 0);
      html += '<span style="font-size:0.72rem;color:var(--text-muted)">' + total + ' visit' + (total !== 1 ? 's' : '') + ' in 7d</span>';
    }
    html += '</div></div>';

    panel.innerHTML = html;
  }

  /* ── Helpers ── */
  function searchFor(mac) {
    inp.value = mac;
    scopeBtns.forEach(function(b){ b.classList.remove('active'); });
    var all = document.querySelector('.inv-scope[data-scope="all"]');
    if (all) { all.classList.add('active'); currentScope = 'all'; }
    doSearch(mac);
  }
  window.searchFor = searchFor;

  function searchVehicle(sensorId) {
    inp.value = sensorId;
    scopeBtns.forEach(function(b){ b.classList.remove('active'); });
    var v = document.querySelector('.inv-scope[data-scope="vehicles"]');
    if (v) { v.classList.add('active'); currentScope = 'vehicles'; }
    doSearch(sensorId);
  }
  window.searchVehicle = searchVehicle;

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDateOnly(iso) {
    try { return new Date(iso).toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'2-digit'}); }
    catch(e) { return iso || '—'; }
  }

  /* ── URL param pre-fill (e.g. /investigate?q=something) ── */
  var urlParams = new URLSearchParams(window.location.search);
  var preQ = urlParams.get('q');
  if (preQ && preQ.trim().length >= 2) {
    inp.value = preQ.trim();
    doSearch(preQ.trim());
  } else {
    inp.focus();
  }

})();
</script>
{% endblock %}
