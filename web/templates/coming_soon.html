{% extends "base.html" %}
{% block title %} — {{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ page_title }}</h1>
  <span class="subtitle">{{ page_desc }}</span>
</div>
<div class="card">
  <div class="empty-state" style="padding:4rem 2rem">
    <div style="font-size:1.4rem;color:var(--border-hi);margin-bottom:1rem;letter-spacing:3px">[ UNDER CONSTRUCTION ]</div>
    <div style="color:var(--text-dim);font-size:0.82rem">{{ page_desc }}</div>
  </div>
</div>
{% endblock %}
